<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Resposta enviada</title>
<meta name="theme-color" content="#3b82f6">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#0f172a; color:#f1f5f9; font-family:"Segoe UI",system-ui,sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:24px; text-align:center; }
  .icon { font-size:4rem; margin-bottom:16px; }
  h1 { font-size:1.6rem; font-weight:800; margin-bottom:8px; color:#4ade80; }
  .sub { color:#94a3b8; font-size:1rem; margin-bottom:8px; }
  .form-nome { font-size:1.1rem; font-weight:700; margin-bottom:32px; }
  .btn { display:block; width:100%; max-width:360px; padding:16px; border-radius:12px; border:none; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; text-align:center; margin-bottom:12px; }
  .btn-ghost { background:#1e293b; color:#94a3b8; border:1px solid #334155; }
</style>
</head>
<body>
<div class="icon">✅</div>
<h1>Resposta enviada!</h1>
<div class="sub" id="hoje"></div>
<div class="form-nome">{{ tpl.nome }}</div>
<a href="{{ url_for('formularios.form_mobile', org_slug=org.slug, form_slug=tpl.slug) }}" class="btn btn-ghost">Preencher novamente</a>
<script>
document.getElementById('hoje').textContent = new Date().toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'long'});
</script>
</body>
</html>
