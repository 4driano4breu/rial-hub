<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QR Code — {{ template.nome }}</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fff; color: #0f172a; font-family: "Segoe UI", system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.container { text-align: center; max-width: 480px; width: 100%; }
.logo { font-size: 1rem; font-weight: 800; color: #3b82f6; margin-bottom: 24px; letter-spacing: .02em; }
h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
.sub { color: #64748b; font-size: .95rem; margin-bottom: 32px; }
#qr-canvas { margin: 0 auto 24px; display: block; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; }
.url-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px 16px; font-size: .8rem; font-family: monospace; color: #475569; word-break: break-all; margin-bottom: 24px; }
.actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.btn { padding: 10px 20px; border-radius: 8px; font-size: .9rem; font-weight: 600; cursor: pointer; border: none; text-decoration: none; display: inline-block; }
.btn-print { background: #0f172a; color: #fff; }
.btn-back { background: #f1f5f9; color: #0f172a; }
.btn-back:hover { background: #e2e8f0; }
@media print {
  .actions { display: none; }
  body { padding: 0; }
}
</style>
</head>
<body>
<div class="container">
  <div class="logo">OBRIA</div>
  <h1>{{ template.nome }}</h1>
  {% if template.descricao %}
  <p class="sub">{{ template.descricao }}</p>
  {% else %}
  <p class="sub">Escaneie o QR code para preencher o formulário</p>
  {% endif %}

  <canvas id="qr-canvas"></canvas>

  <div class="url-box">{{ url_publica }}</div>

  <div class="actions">
    <button class="btn btn-print" onclick="window.print()">🖨 Imprimir</button>
    <a href="{{ url_for('formularios.editar', id=template.id) }}" class="btn btn-back">← Voltar</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"
        integrity="sha384-Izc791esqyEy3BEIC42q7jbE0AaOkACziN+dyyXgYeDmpeMCLz0xA+xYN3aCd5zz"
        crossorigin="anonymous"></script>
<script>
QRCode.toCanvas(document.getElementById('qr-canvas'), {{ url_publica | tojson }}, {
  width: 250,
  margin: 1,
  color: { dark: '#0f172a', light: '#ffffff' }
}, function(err) {
  if (err) {
    document.getElementById('qr-canvas').outerHTML =
      '<div style="padding:40px;border:1px solid #e2e8f0;border-radius:8px;color:#64748b">QR code indisponível.<br>Use a URL acima.</div>';
  }
});
</script>
</body>
</html>
